{% extends "base.html" %}
{% block content %}
<h4 class="mb-3">{{ title }}</h4>
<div class="card">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn btn-dark" type="submit">Сохранить</button>
      <a class="btn btn-outline-secondary" href="javascript:history.back()">Отмена</a>
    </form>
  </div>
</div>
{% endblock %}
