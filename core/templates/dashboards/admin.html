{% extends "base.html" %}
{% block title %}Дашборд администратора{% endblock %}
{% block content %}
<h4 class="mb-3">Дашборд администратора</h4>
<div class="row g-3">
  <div class="col-md-4">
    <div class="card"><div class="card-body">
      <div class="text-muted">Всего заказов</div>
      <div class="display-6">{{ total_orders }}</div>
    </div></div>
  </div>
  <div class="col-md-4">
    <div class="card"><div class="card-body">
      <div class="text-muted">Клиентов</div>
      <div class="display-6">{{ total_clients }}</div>
    </div></div>
  </div>
  <div class="col-md-4">
    <div class="card"><div class="card-body">
      <div class="text-muted">Позиции ниже минимума</div>
      <div class="display-6">{{ low_stock_count }}</div>
    </div></div>
  </div>
</div>
{% endblock %}
